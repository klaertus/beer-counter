<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Beer Counter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --container-bg: #2c2c2c;
            --component-bg: #3a3a3a;
            --primary-color: #5c6bc0;
            --primary-hover: #3f51b5;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --border-radius-lg: 16px;
            --border-radius-md: 12px;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #2a2a2a 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .login-container {
            background-color: var(--container-bg);
            border-radius: var(--border-radius-lg);
            padding: 3rem 2rem;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }

        .login-header p {
            color: var(--text-muted);
            margin: 0;
        }

        .form-control {
            background-color: var(--component-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            border-radius: var(--border-radius-md);
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }

        .form-control:focus {
            background-color: var(--component-bg);
            border-color: var(--primary-color);
            color: var(--text-light);
            box-shadow: 0 0 0 0.2rem rgba(92, 107, 192, 0.25);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        .btn-admin {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: var(--border-radius-md);
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-admin:hover {
            background: linear-gradient(135deg, var(--primary-hover), #303f9f);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(92, 107, 192, 0.4);
        }

        .btn-admin:active {
            transform: translateY(0);
        }

        .alert {
            border-radius: var(--border-radius-md);
            border: none;
            margin-bottom: 1.5rem;
        }

        .alert-danger {
            background-color: #d32f2f;
            color: white;
        }

        .alert-success {
            background-color: #388e3c;
            color: white;
        }

        .alert-info {
            background-color: #1976d2;
            color: white;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: var(--primary-color);
        }

        .admin-icon {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-shield-alt admin-icon"></i>
            <h1>Admin Panel</h1>
            <p>Enter your admin password to continue</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else category }}" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('admin_login_post') }}">
            <div class="mb-3">
                <label for="password" class="form-label">Admin Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-light">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Enter admin password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-admin">
                <i class="fas fa-sign-in-alt me-2"></i>
                Login to Admin Panel
            </button>
        </form>

        <div class="back-link">
            <a href="/">
                <i class="fas fa-arrow-left me-1"></i>
                Back to Beer Counter
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
