{% extends 'base.html' %}
{% block title %}Session Admin Login{% endblock %}

{% block body %}
<div class="vh-100 d-flex align-items-center justify-content-center">
    <div class="card p-4" style="max-width: 380px; width: 100%;">
        <div class="mb-3">
            <i class="fas fa-shield-halved text-amber fa-2x"></i>
        </div>
        <h4 class="fw-bold mb-1">Session Admin</h4>
        <p class="text-muted mb-4 small">Enter your session code to access the admin panel.</p>

        <div class="mb-3">
            <label class="form-label fw-semibold">Session Code</label>
            <input type="text" id="codeInput" class="form-control form-control-lg text-center fw-bold"
                   placeholder="BEER26" maxlength="10" autocapitalize="characters"
                   autocorrect="off" spellcheck="false"
                   style="letter-spacing: 0.2em;"
                   onkeypress="if(event.key==='Enter') goToAdmin()">
        </div>
        <button class="btn btn-amber w-100" onclick="goToAdmin()">Continue</button>
        <a href="{{ url_for('public.home') }}" class="btn btn-link text-muted mt-2 w-100">
            <i class="fas fa-arrow-left me-1"></i>Back to home
        </a>
    </div>
</div>

{% block scripts %}
<script>
function goToAdmin() {
    const code = document.getElementById('codeInput').value.trim().toUpperCase();
    if (code) window.location.href = `/admin/${code}/login`;
}
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('codeInput').focus();
});
</script>
{% endblock %}
{% endblock %}
